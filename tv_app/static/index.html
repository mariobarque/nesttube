<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NestTube</title>
  <link rel="icon" href="/static/favicon.ico" type="image/x-icon" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

  <!-- ══ TOP BAR (always visible, hidden on lock/player-fullscreen) ══════════ -->
  <header id="top-bar">
    <div class="logo"><img src="/static/logo.png" alt="NestTube" class="logo-img" /> NestTube</div>
    <div id="categories-bar"></div>
    <div class="top-bar-right">
      <button class="icon-btn" id="search-btn" aria-label="Search" onclick="showScreen('search')">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </button>
      <div id="time-badge" class="time-badge"></div>
    </div>
  </header>

  <!-- ══ WARNING OVERLAY ════════════════════════════════════════════════════ -->
  <div id="warning-overlay" class="overlay-banner hidden">
    <span id="warning-text"></span>
  </div>

  <!-- ══ LOCK SCREEN ════════════════════════════════════════════════════════ -->
  <div id="lock-screen" class="fullscreen-overlay hidden">
    <div class="lock-card">
      <div class="lock-icon">🔒</div>
      <h2 id="lock-title">Screen Time Limit Reached</h2>
      <p id="lock-msg"></p>
      <div id="unlock-section">
        <input id="unlock-input" type="password" placeholder="Parent passcode" autocomplete="off" />
        <button onclick="tryUnlock()">Add 30 minutes</button>
        <p id="unlock-error" class="error-msg hidden">Incorrect passcode.</p>
      </div>
    </div>
  </div>

  <!-- ══ HOME SCREEN ════════════════════════════════════════════════════════ -->
  <main id="screen-home" class="screen active">
    <div id="home-empty" class="empty-state hidden">
      <p>No channels added yet.</p>
      <p class="sub">Ask your parent to add channels from the Admin Panel.</p>
    </div>
    <div id="video-grid" class="video-grid"></div>
  </main>

  <!-- ══ SEARCH SCREEN ══════════════════════════════════════════════════════ -->
  <main id="screen-search" class="screen">
    <div class="search-bar-wrap">
      <button class="back-btn" onclick="showScreen('home')">&#8592; Back</button>
      <input id="search-input" type="search" placeholder="Search your channels…" autocomplete="off" />
    </div>
    <div id="search-empty" class="empty-state hidden">
      <p>No results found in your channels.</p>
    </div>
    <div id="search-grid" class="video-grid"></div>
  </main>

  <!-- ══ PLAYER SCREEN ══════════════════════════════════════════════════════ -->
  <main id="screen-player" class="screen">
    <div class="player-layout">
      <div class="player-top-bar">
        <button class="back-btn" onclick="exitPlayer()">&#8592; Back</button>
        <span id="player-title" class="player-title-text"></span>
        <span id="player-channel" class="player-channel-text"></span>
      </div>
      <!-- YouTube IFrame Player target -->
      <div id="player-wrap">
        <div id="yt-player"></div>
      </div>
    </div>
  </main>

  <!-- ══ WATCH-NEXT SCREEN ══════════════════════════════════════════════════ -->
  <main id="screen-watchnext" class="screen">
    <div class="watchnext-header">
      <button class="back-btn" onclick="showScreen('home')">&#8592; Home</button>
      <h2>Watch Next</h2>
    </div>
    <div id="watchnext-grid" class="video-grid"></div>
  </main>

  <!-- ══ Scripts ════════════════════════════════════════════════════════════ -->
  <script src="https://www.youtube.com/iframe_api"></script>
  <script src="/static/app.js"></script>
</body>
</html>
